name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cob-${VERSION}-linux-amd64       ./cmd/cob
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cob-${VERSION}-linux-arm64       ./cmd/cob
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cob-${VERSION}-darwin-amd64      ./cmd/cob
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cob-${VERSION}-darwin-arm64      ./cmd/cob
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cob-${VERSION}-windows-amd64.exe ./cmd/cob

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
